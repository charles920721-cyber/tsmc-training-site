<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>進入網站｜台積電訓練網站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="gate-body" data-title-key="gate.title">
  <div class="bg-atmosphere" aria-hidden="true"></div>

  <main class="gate">
    <p class="brand-mark">TSMC Lab</p>
    <h1 data-i18n="gate.h1">台積電訓練網站</h1>
    <p class="hero-lead" data-i18n="gate.lead">請選擇進入方式。訪客可瀏覽教材；登入後可使用內容管理後台。</p>

    <div class="gate-actions" id="gate-choice">
      <button type="button" class="btn btn-primary" id="btn-guest" data-i18n="gate.guest">訪客進入</button>
      <button type="button" class="btn btn-ghost" id="btn-show-login" data-i18n="gate.login">登入</button>
    </div>

    <form class="gate-login" id="login-form" hidden>
      <label>
        <span data-i18n="gate.username">帳號</span>
        <input type="text" id="login-username" name="username" autocomplete="username" required />
      </label>
      <label>
        <span data-i18n="gate.password">密碼</span>
        <input type="password" id="login-password" name="password" autocomplete="current-password" required />
      </label>
      <p class="gate-error" id="login-error" hidden></p>
      <div class="gate-login-actions">
        <button type="submit" class="btn btn-primary" data-i18n="gate.submit">確認登入</button>
        <button type="button" class="btn btn-ghost" id="btn-back" data-i18n="gate.back">返回</button>
      </div>
    </form>
  </main>

  <script src="js/auth-client.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/gate.js"></script>
</body>
</html>
